# config/robot_ontology.yaml
# Scene structure knowledge only.
# Object definitions (categories, actions, synonyms) → object_registry.yaml

structural_blacklist:
  - "wall"
  - "floor"
  - "ceiling"
  - "wooden floor"
  - "white wall"
  - "white ceiling"
  - "window"
  - "door"
  - "ground"
  - "white box"
  - "concrete floor"
  - "tile floor"
  - "carpet"
  - "baseboard"
  - "room"
  - "background"
  - "surface"
  - "area"

static_fixtures:
  - "sofa"
  - "couch"
  - "sectional"
  - "bed"
  - "bathtub"
  - "wardrobe"
  - "closet"
  - "refrigerator"
  - "fridge"
  - "toilet"
  - "shower"
  - "cabinet"
  - "tv"
  - "television"
  - "monitor"

high_affordance_furniture:
  - "tv"
  - "television"
  - "monitor"
  - "screen"
  - "stove"
  - "oven"
  - "refrigerator"
  - "fridge"
  - "keyboard"
  - "cabinet"

exclusive_behaviours:
  - "Laying"
  - "Cooking"
  - "Opening"
  - "Typing"
  - "Cleaning"
  - "Watching"

body_constraints:
  impossible:
    lying:
      - "Cleaning"
      - "Cooking"
      - "Opening"
      - "Typing"
      - "Walking"
      - "Drinking"
      - "Standing"
      - "Eating"
      - "PhoneUse"
      - "Reading"
      - "Watching"
    sitting:
      - "Laying"
      - "Walking"
      - "Opening"
      - "Cleaning"
      - "Cooking"
      - "Drinking"
    standing:
      - "Laying"
      - "SittingDrink"
      - "Sitting"
      - "Watching"
      - "Typing"
      - "Reading"
      - "Eating"

# label_normalize_map is now auto-generated from object_registry.yaml normalize_from fields.
# Furniture-level normalization (not object-level) stays here:
furniture_normalize_map:
  sofa:        "couch"
  settee:      "couch"
  sofa side:   "couch"
  sofa side 2: "couch"
  dad's bed:   "bed"
  cabinet2:    "cabinet"

object_normalize_map:
  bottle:      "water"
  waterbottle: "water"
  water bottle: "water"