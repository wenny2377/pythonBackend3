# ══════════════════════════════════════════════════════════════
# Entropy Monitor
# Controls how multi-view VLM voting consistency affects W_VLM
#
# With 4 images (topN=2 cameras x burst=2):
#   entropy = 0.0  → 4:0 unanimous
#   entropy = 0.4  → 3:1 mostly consistent
#   entropy = 1.0  → 2:2 split
#   entropy = 1.2  → 2:1:1 three-way split
#   entropy = 2.0  → 1:1:1:1 fully random
#
# When entropy is high → VLM votes are inconsistent → lower W_VLM
# When entropy is low  → VLM votes agree → higher W_VLM
# ══════════════════════════════════════════════════════════════
entropy:
  high_threshold:   1.2
  low_threshold:    0.4
  vlm_weight_high:  0.10
  vlm_weight_low:   0.30
  vlm_weight_default: 0.20

# ══════════════════════════════════════════════════════════════
# SayCan Engine
# ══════════════════════════════════════════════════════════════
saycan:
  env_fallback:    0.30
  min_gate_score:  0.05